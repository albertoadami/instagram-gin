version: '3.8'
services:
  postgres:
    image: postgres:17
    container_name: instagram-gin-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: instagram_gin_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U instagram_gin_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: ./migrations
      dockerfile: Dockerfile
    container_name: instagram-gin-migrations
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/instagram_gin_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    command: ["-dir=/migrations", "postgres", "postgres://user:password@postgres:5432/instagram_gin_db?sslmode=disable", "up"]
    restart: "no"  # Run once and exit

  app:
    build: .
    container_name: instagram-gin
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: instagram_gin_db
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
              condition: service_completed_successfully        
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5